name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      WSTP_COMPILER_ADDITIONS_DIRECTORY: /tmp/WSTP
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Prepare fake WSTP
        run: |
          mkdir -p /tmp/WSTP
          cat << 'C_EOF' > /tmp/WSTP/dummy.c
          void WSInitialize() {}
          void WSDeinitialize() {}
          void WSErrorString() {}
          void WSReleaseUTF8String() {}
          void WSReleaseUTF8Symbol() {}
          void WSOpenArgcArgv() {}
          void WSGetType() {}
          void WSGetArgCount() {}
          void WSGetUTF8String() {}
          void WSGetUTF8Symbol() {}
          void WSGetReal64() {}
          void WSGetInteger64() {}
          void WSEndPacket() {}
          void WSPutUTF8Symbol() {}
          void WSPutType() {}
          void WSPutArgCount() {}
          void WSPutReal64() {}
          void WSPutInteger64() {}
          void WSPutUTF8String() {}
          void WSActivate() {}
          void WSWaitForLinkActivityWithCallback() {}
          void WSGetNext() {}
          void WSPutFunction() {}
          void WSNewPacket() {}
          void WSNextPacket() {}
          void WSPutString() {}
          void WSGetFunction() {}
          void WSPutInteger32() {}
          void WSGetInteger32() {}
          void WSGetReal32() {}
          void WSPutReal32() {}
          void WSGetNumberAsInteger() {}
          void WSPutMessage() {}
          void WSPutMessageWithArg() {}
          void WSGetMessage() {}
          void WSGetMessageWithArg() {}
          C_EOF
          gcc -c /tmp/WSTP/dummy.c -o /tmp/WSTP/dummy.o
          ar rcs /tmp/WSTP/libWSTP64i4.a /tmp/WSTP/dummy.o
          touch /tmp/WSTP/wstp.h
      - name: fmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: test
        run: cargo check --all-targets
