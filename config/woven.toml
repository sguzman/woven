mode = "dev"

[logging]
level = "info"

[logging.file]
# In `dev` mode, file logging is enabled by default.
enabled = true
# Log file base path. Each run writes to a unique timestamped file derived from this.
# Relative paths are resolved relative to the repo root.
path = "logs/woven.log"
# Rolling policy (currently only "run" is supported).
rolling = "run"

[kernel]
# Optional path to a WolframKernel executable. If omitted, Woven will auto-discover.
path = ""
start_timeout_ms = 20000
eval_timeout_ms = 60000

[ui]
font_scale = 1.0
notebook_path = "notebooks/default.json"
theme = "dark"
autosave_enabled = true
autosave_interval_ms = 10000
nav_width = 280.0
inspector_width = 360.0
inspector_max_width = 560.0

[plot]
# Reserved for upcoming plot interception / rendering tuning.
placeholder_enabled = true
max_output_chars = 200000
max_messages = 1000
